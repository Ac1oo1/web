<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iframe 導覽範例</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:"Microsoft JhengHei",sans-serif;
}

/* 整體左右布局 */

.container{
    display:flex;
    width:100%;
    height:100vh;
}

/* 左側選單 */

.sidebar{
    width:260px;
    background:#2c3e50;
    color:white;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
    text-align:center;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:10px;
}

.menu a{
    display:block;
    padding:12px 15px;
    text-decoration:none;
    color:white;
    border-radius:8px;
    transition:.3s;
}

.menu a:hover{
    background:#34495e;
}

/* 右側內容 */

.content{
    flex:1;
    background:#f5f5f5;
}

.content iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>

</head>

<body>

<div class="container">

```
<!-- 左側選單 -->

<div class="sidebar">

    <h2>網站導覽</h2>

    <ul class="menu">

        <li>
            <a href="index.html" target="mainFrame">
                首頁
            </a>
        </li>

        <li>
            <a href="https://www.momoshop.com.tw" target="mainFrame">
                角色介紹
            </a>
        </li>

        <li>
            <a href="character-main1.jpg" target="mainFrame">
                電子書
            </a>
        </li>

        <li>
            <a href="character-main2.jpg" target="mainFrame">
                聯絡我們
            </a>
        </li>

        <li>
            <a href="goods.jpg" target="mainFrame">
                故事大綱
            </a>
        </li>

    </ul>

</div>

<!-- 右側 iframe -->

<div class="content">

    <iframe
        name="mainFrame"
        src="index.html">
    </iframe>

</div>
```

</div>

</body>
</html>
