<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>圖片翻頁瀏覽器</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

#viewer{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 固定頁面區域 */
.page-frame{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* 圖片自動符合視窗 */
#photo{
    width:100%;
    height:100%;
    object-fit:contain;

    user-select:none;
    -webkit-user-drag:none;
}

/* 控制列 */
.controls{

    position:fixed;
    bottom:15px;
    left:50%;

    transform:translateX(-50%);

    display:flex;
    align-items:center;
    gap:10px;

    z-index:999;
}

button{

    padding:10px 18px;

    border:none;
    border-radius:6px;

    background:#2196F3;
    color:#fff;

    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

#pageNo{

    color:white;
    font-size:18px;
    min-width:90px;
    text-align:center;
}

</style>
</head>

<body>

<div id="viewer">

    <div class="page-frame">

        <img id="photo" src="1.jpg" alt="">

    </div>

</div>

<div class="controls">

    <button onclick="prevPage()">◀ 上一頁</button>

    <span id="pageNo">1 / 10</span>

    <button onclick="nextPage()">下一頁 ▶</button>

</div>

<script>

// 圖片清單
const images = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg",
    "7.jpg",
    "8.jpg",
    "9.jpg",
    "10.jpg"
];

let currentPage = 0;

const photo = document.getElementById("photo");
const pageNo = document.getElementById("pageNo");

function showPage(index){

    photo.src = images[index];

    pageNo.textContent =
        `${index + 1} / ${images.length}`;

    preload(index + 1);
}

function nextPage(){

    if(currentPage < images.length - 1){

        currentPage++;

        showPage(currentPage);
    }
}

function prevPage(){

    if(currentPage > 0){

        currentPage--;

        showPage(currentPage);
    }
}

// 鍵盤翻頁
document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowRight" ||
       e.key==="PageDown" ||
       e.key===" "){

        nextPage();
    }

    if(e.key==="ArrowLeft" ||
       e.key==="PageUp"){

        prevPage();
    }
});

// 滑鼠滾輪翻頁
let wheelLock=false;

document.addEventListener("wheel",(e)=>{

    if(wheelLock) return;

    wheelLock=true;

    setTimeout(()=>{
        wheelLock=false;
    },300);

    if(e.deltaY>0){
        nextPage();
    }else{
        prevPage();
    }

},{passive:true});


// 手機滑動翻頁
let touchStartX=0;

document.addEventListener("touchstart",(e)=>{

    touchStartX =
        e.changedTouches[0].screenX;

});

document.addEventListener("touchend",(e)=>{

    const touchEndX =
        e.changedTouches[0].screenX;

    const diff =
        touchStartX - touchEndX;

    if(Math.abs(diff) < 50) return;

    if(diff > 0){
        nextPage();
    }else{
        prevPage();
    }

});

// 預載下一張圖片
function preload(index){

    if(index >= images.length) return;

    const img = new Image();
    img.src = images[index];
}

// 初始頁
showPage(0);

</script>

</body>
</html>
